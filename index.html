<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Climate Fest Flyer</title>

  <style>
    body {
      background: #0c1f1e;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 30px;
    }

    h1 {
      color: #00d1b2;
    }

    img {
      width: 120px;
      margin-bottom: 10px;
    }

    input, button {
      padding: 10px;
      margin: 8px;
      border-radius: 6px;
      border: none;
    }

    button {
      background: #00d1b2;
      font-weight: bold;
      cursor: pointer;
    }

    canvas {
      margin-top: 20px;
      max-width: 100%;
      background: black;
    }
  </style>
</head>

<body>

  <img src="logo.png" onerror="this.style.display='none'">

  <h1>CLIMATE FEST 2026</h1>
  <p>Crea tu flyer y compártelo</p>

  <input type="file" id="upload"><br>
  <input type="text" id="name" placeholder="Tu nombre"><br>

  <button onclick="draw()">Generar</button>

  <br>

  <canvas id="canvas" width="1080" height="1080"></canvas>

  <br>

  <button onclick="download()">Descargar</button>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let img = new Image();
let overlay = new Image();
overlay.src = "overlay.png";

document.getElementById("upload").addEventListener("change", function(e){
  const file = e.target.files[0];
  if(!file) return;

  img.src = URL.createObjectURL(file);
});

function draw(){
  if(!img.src){
    alert("Sube una imagen");
    return;
  }

  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

  ctx.drawImage(overlay, 0, 0, canvas.width, canvas.height);

  const name = document.getElementById("name").value;

  if(name){
    ctx.fillStyle = "white";
    ctx.font = "40px Arial";
    ctx.textAlign = "center";
    ctx.fillText(name, canvas.width/2, 950);
  }
}

function download(){
  const link = document.createElement("a");
  link.download = "flyer.png";
  link.href = canvas.toDataURL();
  link.click();
}
</script>

</body>
</html>
