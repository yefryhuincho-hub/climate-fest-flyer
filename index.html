<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Climate Fest Flyer</title>

  <style>
    body {
      background: #0c1f1e;
      color: white;
      font-family: Roboto, sans-serif;
      text-align: center;
      padding: 30px;
    }

    h1 {
      color: #00d1b2;
    }

    img {
      width: 120px;
      margin-bottom: 10px;
    }

    input, button {
      padding: 12px;
      margin: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #00d1b2;
      font-weight: bold;
      cursor: pointer;
    }

    #canvas {
      display: none; /* 🔴 oculto al inicio */
      margin-top: 20px;
      max-width: 100%;
      background: black;
      border-radius: 10px;
    }

    .hint {
      opacity: 0.7;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <img src="logo.png" onerror="this.style.display='none'">

  <h1>CLIMATE FEST 2026</h1>
  <p>Crea tu flyer y compártelo en tus redes</p>

  <p class="hint">Sube tu foto para comenzar</p>

  <input type="file" id="upload" accept="image/*"><br>
  <input type="text" id="name" placeholder="Tu nombre (opcional)"><br>

  <button onclick="drawManual()">Generar flyer</button>

  <br>

  <canvas id="canvas" width="1080" height="1080"></canvas>

  <br>

  <button onclick="download()">Descargar</button>

  <p class="hint">Usa la rueda del mouse para hacer zoom y arrastra para ajustar</p>
  <p>#ClimateFest2026</p>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let img = new Image();
let overlay = new Image();
overlay.src = "overlay.png";

let scale = 1;
let posX = 0;
let posY = 0;

let dragging = false;
let startX, startY;

// subir imagen
document.getElementById("upload").addEventListener("change", function(e){
  const file = e.target.files[0];
  if(!file) return;

  img.src = URL.createObjectURL(file);

  img.onload = () => {
    scale = 1;

    posX = (canvas.width - img.width) / 2;
    posY = (canvas.height - img.height) / 2;

    canvas.style.display = "block"; // 🔥 aparece recién aquí

    draw();
  };
});

// zoom
canvas.addEventListener("wheel", (e) => {
  e.preventDefault();
  scale += e.deltaY * -0.001;
  scale = Math.min(Math.max(0.5, scale), 3);
  draw();
});

// drag
canvas.addEventListener("mousedown", (e) => {
  dragging = true;
  startX = e.offsetX - posX;
  startY = e.offsetY - posY;
});

canvas.addEventListener("mousemove", (e) => {
  if(dragging){
    posX = e.offsetX - startX;
    posY = e.offsetY - startY;
    draw();
  }
});

canvas.addEventListener("mouseup", () => dragging = false);
canvas.addEventListener("mouseleave", () => dragging = false);

// dibujar
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(!img.src) return;

  const imgWidth = img.width * scale;
  const imgHeight = img.height * scale;

  ctx.drawImage(img, posX, posY, imgWidth, imgHeight);

  ctx.drawImage(overlay, 0, 0, canvas.width, canvas.height);

  const name = document.getElementById("name").value;

  if(name){
    ctx.fillStyle = "white";
    ctx.font = "40px Arial";
    ctx.textAlign = "center";
    ctx.fillText(name, canvas.width/2, 950);
  }
}

// botón
function drawManual(){
  draw();
}

// descargar
function download(){
  const link = document.createElement("a");
  link.download = "flyer.png";
  link.href = canvas.toDataURL();
  link.click();
}
</script>

</body>
</html>
