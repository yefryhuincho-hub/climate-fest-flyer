<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let userImg = new Image();
let overlay = new Image();
overlay.src = 'overlay.png';

let scale = 1;
let posX = 0;
let posY = 0;
let isDragging = false;
let startX, startY;

document.getElementById('upload').addEventListener('change', function(e) {
  const file = e.target.files[0];
  userImg.src = URL.createObjectURL(file);

  userImg.onload = () => {
    scale = 1;
    posX = 0;
    posY = 0;
    draw();
  };
});

// ZOOM con rueda del mouse
canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  scale += e.deltaY * -0.001;
  scale = Math.min(Math.max(0.5, scale), 3);
  draw();
});

// DRAG (mover imagen)
canvas.addEventListener('mousedown', (e) => {
  isDragging = true;
  startX = e.offsetX - posX;
  startY = e.offsetY - posY;
});

canvas.addEventListener('mousemove', (e) => {
  if (isDragging) {
    posX = e.offsetX - startX;
    posY = e.offsetY - startY;
    draw();
  }
});

canvas.addEventListener('mouseup', () => isDragging = false);
canvas.addEventListener('mouseleave', () => isDragging = false);

// DIBUJO
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!userImg.src) return;

  const imgWidth = userImg.width * scale;
  const imgHeight = userImg.height * scale;

  // recorte circular (opcional)
  ctx.save();
  ctx.beginPath();
  ctx.arc(canvas.width/2, canvas.height/2, 400, 0, Math.PI * 2);
  ctx.closePath();
  ctx.clip();

  ctx.drawImage(userImg, posX, posY, imgWidth, imgHeight);

  ctx.restore();

  ctx.drawImage(overlay, 0, 0, canvas.width, canvas.height);

  const name = document.getElementById('name').value;
  if (name) {
    ctx.font = "bold 50px Arial";
    ctx.fillStyle = "white";
    ctx.textAlign = "center";
    ctx.fillText(name, canvas.width / 2, 950);
  }
}

// BOTÓN GENERAR
function generate() {
  draw();
}

// DESCARGAR
function download() {
  const link = document.createElement('a');
  link.download = 'climatefest.png';
  link.href = canvas.toDataURL("image/png");
  link.click();
}
</script>
